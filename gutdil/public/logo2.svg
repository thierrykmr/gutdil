<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Couleur Gutdil -->
    <linearGradient id="gutdilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:1" />
    </linearGradient>

    <!-- Ombre portée -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>

  <!-- Fond arrondi avec dégradé Gutdil -->
  <rect x="0" y="0" width="200" height="200" rx="40" ry="40" fill="url(#gutdilGrad)" />

  <!-- Lettre G agrandie avec ombre -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
        font-size="120" font-family="Arial, sans-serif" fill="white"
        filter="url(#shadow)">
    G
  </text>
</svg>
